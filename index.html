<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlphaEire Capital — ISEQ Stock Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #00c896;
      --dark: #0d1117;
      --card-bg: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--dark);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .top-bar {
      flex-shrink: 0;
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon { font-size: 1.4rem; color: var(--green); }
    .brand-name { font-weight: 700; font-size: 0.95rem; color: var(--text); }
    .brand-sub { font-size: 0.68rem; color: var(--muted); }
    .top-actions { display: flex; align-items: center; gap: 12px; }
    .badge {
      padding: 3px 10px;
      background: rgba(0,200,150,0.12);
      border: 1px solid rgba(0,200,150,0.3);
      border-radius: 20px;
      font-size: 0.7rem;
      color: var(--green);
      font-weight: 600;
    }
    .btn-pipeline {
      display: inline-block;
      padding: 7px 18px;
      background: var(--green);
      color: #000;
      font-weight: 700;
      font-size: 0.82rem;
      border-radius: 6px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn-pipeline:hover { opacity: 0.85; }
    .dashboard-frame {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
      background: #fff;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="brand">
      <span class="brand-icon">⬡</span>
      <div>
        <div class="brand-name">AlphaEire Capital</div>
        <div class="brand-sub">ISEQ Stock Intelligence &middot; Dashboard built by Siobhán (Maker Agent)</div>
      </div>
    </div>
    <div class="top-actions">
      <span class="badge">🇮🇪 Live ISEQ Dashboard</span>
      <a href="agents.html" class="btn-pipeline">Open Agent Pipeline →</a>
    </div>
  </div>

  <iframe id="dashboard-frame" class="dashboard-frame" sandbox="allow-scripts" title="ISEQ Stock Monitoring Dashboard" src="about:blank"></iframe>

  <script src="demo_data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const frame = document.getElementById('dashboard-frame');
      if (typeof DEMO_DATA !== 'undefined' && DEMO_DATA.maker) {
        frame.srcdoc = DEMO_DATA.maker;
      }
    });
  </script>
</body>
</html>
